name: neurochat
description: "NeuroChat - AI-powered chat application with Gemini API and Firebase"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4

  # State Management
  provider: ^6.1.2

  # HTTP
  http: ^1.2.1

  # Google Fonts
  google_fonts: ^6.2.1

  # Shared Preferences (theme persistence)
  shared_preferences: ^2.3.2

  # Animations
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
